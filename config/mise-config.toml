#:schema https://mise.jdx.dev/schema/mise.json

[tools]

# System Tools
cmake = "latest"
"cargo:dotsh" = "latest"
"cargo:shaka" = "latest"
"cargo:pwshac" = "latest"


# Workflow Tools
just = "latest"
make = "latest"
ninja = "latest"


# JS/TS
node = "lts"
bun = "latest"
deno = "latest"
pnpm = "latest"
"npm:tsx" = "latest"
"npm:taze" = "latest"
"npm:@antfu/ni" = "latest"


# Python
uv = "latest"
python = "latest"


# GO
go = "latest"
gofumpt = "latest"
"go:golang.org/x/tools/gopls" = "latest"


# Rust
rust = "stable"
rust-analyzer = "latest"


# Mobile Apps
java = "latest"
# dart = "latest"
# kotlin = "latest"


# php = "latest"
# zig = "latest"
# ruby = "latest"
# "conda:lua" = "latest"
# "conda:luajit" = "latest"


# CLI Tools
"npm:serve" = "latest"
"npm:prettier" = "latest"
"npm:git-stats" = "latest"
"npm:live-server" = "latest"

# AI Tools
"npm:skills" = "latest"
"npm:devrage" = { version = "latest", allow_builds = ["better-sqlite3"] }

# My Tools
"npm:gityo" = "latest"
"npm:netserv" = "latest"
"npm:uni-run" = "latest"
"npm:mytokens" = "latest"
"npm:code-info" = "latest"
"npm:opencode-armor" = "latest"


# MCP
"npm:chrome-devtools-mcp" = "latest"


# Cloud Tools
stripe = "latest"
gcloud = "latest"
firebase = "latest"
wrangler = "latest"
terraform = "latest"
serverless = "latest"


[settings]
auto_install = false
exec_auto_install = true
not_found_auto_install = true
trusted_config_paths = ["~/Desktop"]

node.corepack = true
npm.package_manager = "pnpm"

minimum_release_age_excludes = [
  # Tools
  "pnpm",

  # My Tools
  "npm:gityo",
  "npm:netserv",
  "npm:uni-run",
  "npm:mytokens",
  "npm:code-info",
  "npm:opencode-armor",
]
