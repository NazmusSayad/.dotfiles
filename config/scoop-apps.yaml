opencode-desktop-beta:
  description: OpenCode desktop app (Beta)
  homepage: https://github.com/anomalyco/opencode

  extract: $PLUGINSDIR
  install:
    - Expand-7zipArchive (Join-Path $dir 'app-64.7z') (Join-Path $dir 'app')

  bin:
    - - app/OpenCode.exe
      - opencode-desktop-beta
  shortcuts:
    - - app/OpenCode.exe
      - OpenCode Desktop (Beta)

  version:
    url: https://api.github.com/repos/anomalyco/opencode/releases
    regex: "\"tag_name\"\\s*:\\s*\"v([^\"]+)\""

  autoupdate:
    architecture:
      arm64:
        url: https://github.com/anomalyco/opencode/releases/download/v$version/opencode-electron-win-arm64.exe#/dl.7z
      64bit:
        url: https://github.com/anomalyco/opencode/releases/download/v$version/opencode-electron-win-x64.exe#/dl.7z

t3code:
  description: T3 Code desktop app
  homepage: https://github.com/pingdotgg/t3code

  extract: $PLUGINSDIR
  install:
    - Expand-7zipArchive (Join-Path $dir 'app-64.7z') (Join-Path $dir 'app')

  bin:
    - - app/T3 Code.exe
      - t3code
  shortcuts:
    - - app/T3 Code.exe
      - T3 Code

  version:
    url: https://api.github.com/repos/pingdotgg/t3code/releases?per_page=100
    regex: "\"tag_name\"\\s*:\\s*\"v([^\"]+)\""

  autoupdate:
    architecture:
      64bit:
        url: https://github.com/pingdotgg/t3code/releases/download/v$version/T3-Code-$version-x64.exe#/dl.7z
