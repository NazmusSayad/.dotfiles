shell-integration = fish
shell-integration-features = no-cursor,sudo,no-title

font-family = JetBrains Mono
font-size = 13
font-feature = -calt
font-thicken = true

theme = catppuccin-mocha
background = #1e1e2e
foreground = #cdd6f4
selection-background = #353749
selection-foreground = #cdd6f4
cursor-color = #f5e0dc
cursor-text = #1e1e2e

window-padding-x = 8
window-padding-y = 8
window-decoration = auto

mouse-hide-while-typing = true

macos-titlebar-style = tabs
macos-option-as-alt = true

scrollback-limit = 10000000

quit-after-last-window-closed = true
quit-after-last-window-closed-delay = 5s

unfocused-split-opacity = 0.97
unfocused-split-fill = #181825

keybind = cmd+enter=toggle_fullscreen
keybind = cmd+shift+enter=toggle_split_maximize
keybind = cmd+shift+w=close_surface

keybind = cmd+shift+left=resize_split:left,10
keybind = cmd+shift+right=resize_split:right,10
keybind = cmd+shift+up=resize_split:up,10
keybind = cmd+shift+down=resize_split:down,10

keybind = cmd+1=goto_tab:1
keybind = cmd+2=goto_tab:2
keybind = cmd+3=goto_tab:3
keybind = cmd+4=goto_tab:4
keybind = cmd+5=goto_tab:5
keybind = cmd+6=goto_tab:6
keybind = cmd+7=goto_tab:7
keybind = cmd+8=goto_tab:8
keybind = cmd+9=goto_tab:9
