# AI Coding
co: codex
op: opencode
cl: claude --permission-mode bypassPermissions

# NPM
r: node --run
nid: ni -D
pab: pnpm approve-builds --all

# Toolchain
j: just
m: make
fl: fvm flutter

# PHP
pa: php artisan
pas: php artisan serve

# Git
gc: git checkout
gcn: git checkout -b
gds: git diff --stat

# GitHub CLI
ghv: gh repo view
ghw: gh repo view --web

# Docker
dc: docker compose
dcu: docker compose up -d
dcd: docker compose down
dcr: docker compose restart

# System
rmrf: rm -rf
rmf: byenow --yes --one-liner
mi: mise install --yes
mp: mise prune --yes

ex: explorer
fix-next: rm -rf .next
fix-ports: sudo net stop winnat
fix-case-win: sudo fsutil file setCaseSensitiveInfo . enable recursive

"..": cd ..
"...": cd ../..
"....": cd ../../..
".....": cd ../../../..
