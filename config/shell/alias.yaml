# AI Coding
mt: mytokens

oc: opencode
occ: opencode --continue
ocs: opencode-server stop
ocrs: opencode-server stop; pwsh -Command "Start-Process opencode-server -WindowStyle Hidden"

co: codex --yolo
coo: codex resume --yolo --last

cc: claude --permission-mode bypassPermissions
ccc: claude --permission-mode bypassPermissions --continue

wc: CLAUDE_CONFIG_DIR=~/.claude-work claude --permission-mode bypassPermissions
wcc: CLAUDE_CONFIG_DIR=~/.claude-work claude --permission-mode bypassPermissions --continue

# NPM
r: nr
nid: ni -D
pab: pnpm approve-builds --all

# Toolchain
j: just
m: make
fl: fvm flutter

# PHP
pa: php artisan
pas: php artisan serve

# Git
lzg: lazygit
gc: git checkout
gcn: git checkout -b
gds: git diff --stat

# GitHub CLI
ghv: gh repo view
ghw: gh repo view --web

# Docker
lzd: lazydocker
dc: docker compose
dcu: docker compose up -d
dcd: docker compose down
dcr: docker compose restart

# System
lsf: ls -f
rmf: rm -rf

# Mise
mi: mise install --yes
mp: mise prune --yes

ex: explorer
fix-next: rm -rf .next
fix-ports: sudo net stop winnat
fix-case-win: sudo fsutil file setCaseSensitiveInfo . enable recursive

"..": cd ..
"...": cd ../..
"....": cd ../../..
".....": cd ../../../..
