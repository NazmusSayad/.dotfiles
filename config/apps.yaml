  # AI Tools
  - whisper-cpp
  - versions/llama.cpp-cpu
  - extras/opencode-desktop

  # Visualization Tools
  - extras/onefetch
  - extras/hwinfo
  - fastfetch
  - hyperfine
  - btop
  - ntop

  # Shells
  - mise
  - gsudo
  - direnv
  - zoxide
  - starship

  # System Tools
  - nircmd

  # File System Tools
  - ripgrep
  - byenow
  - yazi
  - unzip
  - zip
  - fzf
  - rip
  - dust
  - bat
  - lsd
  - fd
  - jq
